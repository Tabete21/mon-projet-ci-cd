name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify required files
        run: |
          echo "Checking files..."
          ls -la
          test -f index.html && echo "index.html OK"
          test -f app.js && echo "app.js OK"
          echo "Build stage passed!"

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run basic tests
        run: |
          echo "Running tests..."
          grep -q "<html>" index.html
          grep -q "function" app.js
          echo "All tests passed!"

  package:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create build folder
        run: |
          mkdir build
          cp index.html style.css app.js build/
          echo "Package created"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-app
          path: build/

  deploy:
    runs-on: ubuntu-latest
    needs: package
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4